<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        h1 {
            color: #333;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .setting-group {
            margin-bottom: 25px;
        }
        .setting-group h2 {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        .setting-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .setting-item label {
            flex: 1;
            margin-right: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            /* padding: 8px 16px; */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            /* margin-top: 10px; */
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Settings</h1>
    
    <div class="setting-group">
        <h2>General</h2>
        <div class="setting-item">
            <label for="autoRun">Auto-run exercises when selected</label>
            <input type="checkbox" id="autoRun">
        </div>
        <div class="setting-item">
            <label for="theme">Theme</label>
            <select id="theme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="system">System Default</option>
            </select>
        </div>
    </div>
    
    <div class="setting-group">
        <h2>Editor</h2>
        <div class="setting-item">
            <label for="fontSize">Font Size</label>
            <input type="number" id="fontSize" min="10" max="24" value="14">
        </div>
        <div class="setting-item">
            <label for="tabSize">Tab Size</label>
            <input type="number" id="tabSize" min="2" max="8" value="4">
        </div>
    </div>
    
    <button id="saveSettings">Save Settings</button>
    <button id="resetSettings">Reset to Defaults</button>
    
    <script>
        // This is just a placeholder for the real settings functionality
        document.getElementById('saveSettings').addEventListener('click', function() {
            alert('Settings saved successfully!');
        });
        
        document.getElementById('resetSettings').addEventListener('click', function() {
            if (confirm('Are you sure you want to reset all settings to defaults?')) {
                alert('Settings have been reset to defaults.');
            }
        });
    </script>
</body>
</html>
