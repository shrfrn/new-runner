<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
</head>
<body>
    <div class="form-page">
        <h1 class="form-page-title">Settings</h1>

        <section class="form-section" aria-label="General settings">
            <h2 class="form-section-title">General</h2>

            <div class="form-field-row">
                <label for="autoRun">Auto-run exercises when selected</label>
                <input type="checkbox" id="autoRun">
            </div>

            <div class="form-field-row">
                <label for="theme">Theme</label>
                <select id="theme">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="system">System Default</option>
                </select>
            </div>
        </section>

        <section class="form-section" aria-label="Editor settings">
            <h2 class="form-section-title">Editor</h2>

            <div class="form-field-row">
                <label for="fontSize">Font Size</label>
                <input type="number" id="fontSize" min="10" max="24" value="14">
            </div>

            <div class="form-field-row">
                <label for="tabSize">Tab Size</label>
                <input type="number" id="tabSize" min="2" max="8" value="4">
            </div>
        </section>

        <div class="form-button-bar">
            <button id="saveSettings" class="form-button" type="button">Save Settings</button>
            <button id="resetSettings" class="form-button secondary" type="button">Reset to Defaults</button>
        </div>
    </div>

    <script>
        const saveButton = document.getElementById('saveSettings')

        saveButton?.addEventListener('click', onSaveSettings)

        const resetButton = document.getElementById('resetSettings')

        resetButton?.addEventListener('click', onResetSettings)

        function onSaveSettings() {
            alert('Settings saved successfully!')
        }

        function onResetSettings() {
            if (!confirm('Are you sure you want to reset all settings to defaults?')) return

            alert('Settings have been reset to defaults.')
        }
    </script>
</body>
</html>
